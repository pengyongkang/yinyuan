<!doctype html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>JS 文件中心</title>


<style>

:root{
--primary:#2563eb;
--green:#16a34a;
--text:#0f172a;
--muted:#64748b;
}



*{
box-sizing:border-box;
}



body{

margin:0;

min-height:100vh;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
"PingFang SC",
"Microsoft YaHei",
sans-serif;

color:var(--text);


background:
radial-gradient(
circle at 10% 10%,
rgba(96,165,250,.25),
transparent 35%
),
linear-gradient(
135deg,
#f8fbff,
#eef6ff
);

}



/* 密码层 */

#lock{

position:fixed;

inset:0;

display:flex;

align-items:center;

justify-content:center;


background:
rgba(240,246,255,.85);


backdrop-filter:blur(20px);


z-index:9999;


}



.login{


width:360px;

max-width:90%;


padding:35px;


background:white;


border-radius:25px;


box-shadow:
0 20px 60px rgba(37,99,235,.18);


text-align:center;


}



.login h2{

margin:0 0 20px;

font-size:26px;

}



.password-input{


width:100%;

height:50px;


border-radius:15px;


border:1px solid #dbeafe;


padding:0 18px;


font-size:16px;


outline:none;


}



.password-input:focus{

border-color:#60a5fa;

box-shadow:
0 0 0 4px rgba(37,99,235,.12);

}



.login button{


margin-top:15px;


width:100%;


height:50px;


border:0;


border-radius:15px;


background:
linear-gradient(
135deg,
#2563eb,
#60a5fa
);


color:white;


font-weight:700;


font-size:16px;


cursor:pointer;


}



.error{

margin-top:12px;

color:#ef4444;

font-size:14px;

}



/* 首页 */


.container{

max-width:1200px;

margin:auto;

padding:35px 20px;

}



.header{


padding:35px;


border-radius:28px;


background:
rgba(255,255,255,.8);


backdrop-filter:blur(20px);


box-shadow:
0 20px 60px rgba(37,99,235,.12);


margin-bottom:22px;


}



.header h1{

margin:0;

font-size:32px;

}



.header p{

color:var(--muted);

line-height:1.8;

}



code{

background:#eff6ff;

color:#2563eb;

padding:3px 8px;

border-radius:8px;

}



.toolbar{


display:flex;

gap:15px;

align-items:center;

flex-wrap:wrap;


padding:16px;


background:white;


border-radius:20px;


margin-bottom:22px;


}



.search-box{

flex:1;

min-width:260px;

}



.search{


width:100%;


height:48px;


border-radius:15px;


border:1px solid #dbeafe;


padding:0 18px;


font-size:15px;


outline:none;


}



.status{


height:48px;


padding:0 18px;


display:flex;


align-items:center;


background:#f8fafc;


border-radius:15px;


color:var(--muted);


}



.list{

display:grid;

gap:16px;

}



.item{


display:flex;


justify-content:space-between;


align-items:center;


gap:20px;


padding:20px;


background:white;


border-radius:22px;


box-shadow:
0 12px 35px rgba(15,23,42,.07);


}



.file-info{

flex:1;

min-width:0;

}



.file-name{

display:flex;

gap:12px;

align-items:flex-start;


font-weight:700;


word-break:break-all;


overflow-wrap:anywhere;

}



.icon{

width:42px;

height:42px;


flex:none;


display:flex;

align-items:center;

justify-content:center;


background:#dbeafe;


border-radius:14px;


color:#2563eb;


font-weight:900;


}



.url{

margin-top:8px;

font-size:13px;

color:var(--muted);


word-break:break-all;

}



.actions{

display:flex;

gap:10px;

}



.btn{


border:0;


padding:12px 16px;


border-radius:14px;


color:white;


cursor:pointer;


font-weight:700;


}



.copy{

background:#2563eb;

}



.download{

background:#16a34a;

}



.empty{


padding:50px;


text-align:center;


background:white;


border-radius:22px;


}



@media(max-width:700px){

.item{

flex-direction:column;

align-items:stretch;

}


.actions button{

flex:1;

}


}



</style>

</head>


<body>



<!-- 密码页面 -->

<div id="lock">


<div class="login">


<h2>
🔐 访问验证
</h2>


<input
id="pwd"
class="password-input"
type="password"
placeholder="请输入访问密码"
>


<button onclick="unlock()">
进入首页
</button>


<div id="error" class="error"></div>


</div>


</div>




<!-- 首页内容 -->


<div id="app" style="display:none;">


<div class="container">


<div class="header">


<h1>
🚀 JS 文件中心
</h1>


<p>
读取当前目录下
<code>files.json</code>
获取 JS 文件列表。
</p>


</div>



<div class="toolbar">


<div class="search-box">

<input
id="search"
class="search"
placeholder="搜索 JS 文件..."
>

</div>



<div id="status" class="status">
正在读取...
</div>



</div>



<div id="list" class="list"></div>



</div>


</div>




<script>


/* =====================
   简单密码
===================== */


const PASSWORD="1";



function unlock(){


let value=
document.getElementById("pwd").value;


if(value===PASSWORD){


document.getElementById("lock").style.display="none";


document.getElementById("app").style.display="block";


load();


}

else{


document.getElementById("error").textContent=
"密码错误";


}


}



document
.getElementById("pwd")
.addEventListener(
"keydown",
e=>{

if(e.key==="Enter")
unlock();

});





/* =====================
   文件列表逻辑
===================== */


const listEl=
document.getElementById("list");


const searchEl=
document.getElementById("search");


const statusEl=
document.getElementById("status");



let files=[];



function url(file){

return new URL(
file,
location.href
).href;

}



async function copy(text){


await navigator.clipboard.writeText(text);


alert("已复制");

}



function download(u,name){


let a=document.createElement("a");


a.href=u;


a.download=name;


a.click();


}




function render(data){


listEl.innerHTML="";


data.forEach(file=>{


let u=url(file);


let div=document.createElement("div");


div.className="item";


div.innerHTML=`

<div class="file-info">

<div class="file-name">

<div class="icon">
JS
</div>

<div>
${file}
</div>

</div>


<div class="url">
${u}
</div>

</div>


<div class="actions">

<button class="btn copy">
复制
</button>


<button class="btn download">
下载
</button>

</div>

`;



div.querySelector(".copy")
.onclick=
()=>copy(u);



div.querySelector(".download")
.onclick=
()=>download(
u,
file.split("/").pop()
);



listEl.appendChild(div);


});


}




function filter(){


let key=
searchEl.value.toLowerCase();



let result=
files.filter(
x=>x.toLowerCase().includes(key)
);


statusEl.textContent=
`共 ${result.length} 个文件`;


render(result);


}




async function load(){


let res=
await fetch(
"./files.json",
{
cache:"no-store"
}
);



files=
await res.json();


files=
files.filter(
x=>
typeof x==="string"
&&
/\.js$/i.test(x)
);



statusEl.textContent=
`共 ${files.length} 个文件`;


render(files);


}



searchEl.oninput=filter;



</script>


</body>
</html>
